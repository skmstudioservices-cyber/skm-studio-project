<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Shop Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/config.js"></script>
</head>
<body class="bg-gray-50 font-sans">

<!-- LOGIN (magic link - no password, text-only) -->
<div id="loginView" class="max-w-md mx-auto p-6 mt-16 hidden">
  <div class="bg-white p-6 rounded-2xl shadow-md text-center">
    <div class="text-5xl mb-4">&#127978;</div>
    <input id="email" type="email" placeholder="Email" class="w-full px-4 py-3 border rounded-xl text-center mb-3">
    <button onclick="login()" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold text-lg">&#128273; &#10145;</button>
    <p id="loginMsg" class="mt-3 text-2xl"></p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashView" class="max-w-md mx-auto p-4 hidden">
  <header class="flex justify-between items-center mb-4">
    <div class="font-bold text-xl">&#128202;</div>
    <button onclick="logout()" class="text-2xl">&#128682;</button>
  </header>
  <div id="shops" class="space-y-4"></div>
</div>

<script>
const sb = supabase.createClient(SKM_CONFIG.SUPABASE_URL, SKM_CONFIG.SUPABASE_ANON_KEY);

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  document.getElementById(session ? 'dashView' : 'loginView').classList.remove('hidden');
  if (session) loadShops();
}

async function login() {
  const email = document.getElementById('email').value.trim();
  if (!email) return;
  const { error } = await sb.auth.signInWithOtp({ email, options: { emailRedirectTo: location.origin } });
  document.getElementById('loginMsg').textContent = error ? '\u274C' : '\uD83D\uDCE9 \u2705';
}

async function logout() { await sb.auth.signOut(); location.reload(); }

async function loadShops() {
  const { data: { user } } = await sb.auth.getUser();
  const { data: shops } = await sb.from('business_listings').select('*').eq('owner_id', user.id);
  const wrap = document.getElementById('shops');
  if (!shops?.length) { wrap.innerHTML = '<p class="text-center text-5xl mt-10">&#128533;</p>'; return; }

  for (const s of shops) {
    const since = new Date(Date.now() - 7 * 864e5).toISOString();
    const { data: leads } = await sb.from('lead_tracking').select('action_type').eq('shop_id', s.id).gte('clicked_at', since);
    const wa = (leads || []).filter(l => l.action_type === 'whatsapp_click').length;
    const views = (leads || []).filter(l => l.action_type !== 'whatsapp_click').length;
    const total = wa + views;

    // Traffic-light visibility ring
    const ring = total >= 20 ? ['border-green-500', 'text-green-600', '\uD83D\uDFE2']
              : total >= 5  ? ['border-yellow-400', 'text-yellow-600', '\uD83D\uDFE1']
                            : ['border-red-500', 'text-red-600', '\uD83D\uDD34'];

    const el = document.createElement('div');
    el.className = 'bg-white p-5 rounded-2xl shadow-md';
    el.innerHTML = `
      <div class="flex justify-between items-center">
        <div>
          <h2 class="font-bold text-lg">${esc(s.name)}</h2>
          <p class="text-xs text-gray-500 font-mono">${esc(s.digipin || s.pincode)}</p>
        </div>
        <div class="w-16 h-16 rounded-full border-4 ${ring[0]} flex items-center justify-center text-2xl">${ring[2]}</div>
      </div>
      <div class="grid grid-cols-2 gap-3 mt-4 text-center">
        <div class="bg-emerald-50 p-3 rounded-xl"><div class="text-3xl">&#128172;</div><div class="text-2xl font-bold ${ring[1]}">${wa}</div></div>
        <div class="bg-indigo-50 p-3 rounded-xl"><div class="text-3xl">&#128064;</div><div class="text-2xl font-bold">${views}</div></div>
      </div>
      ${s.is_premium
        ? '<div class="mt-4 text-center text-2xl">&#11088; &#9989;</div>'
        : `<button onclick="pay('${s.id}')" class="w-full mt-4 bg-amber-500 text-white p-4 rounded-xl font-bold text-lg">&#128274; &#11088; &#8377;99</button>`}
    `;
    wrap.appendChild(el);
  }
}

function pay(shopId) {
  location.href = `upi://pay?pa=REPLACE_VPA@bank&pn=Maps&am=99&cu=INR&tn=premium_${shopId}`;
}
function esc(s) { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }
init();
</script>
</body>
</html>
