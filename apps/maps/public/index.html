<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maps - Local Business Directory | DigiPIN Search</title>
<meta name="description" content="Find local businesses, transport and services by DigiPIN or Pincode.">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/config.js"></script>
</head>
<body class="bg-gray-50 font-sans">

<header class="p-4 bg-white shadow-sm flex justify-between items-center sticky top-0 z-[1000]">
  <div class="font-bold text-xl text-indigo-600">&#128205; MAPS</div>
  <button id="langToggle" class="px-3 py-1.5 border rounded-full text-sm">&#127760; &#2361;&#2367;&#2344;&#2381;&#2342;&#2368;/EN</button>
</header>

<main class="max-w-md mx-auto p-4">
  <div class="bg-white p-5 rounded-2xl shadow-md mb-4">
    <div class="flex gap-2">
      <input id="searchInput" placeholder="DigiPIN / Pincode" class="flex-1 px-4 py-3 border rounded-xl text-center font-mono text-lg uppercase">
      <button onclick="doSearch()" class="bg-indigo-600 text-white px-5 rounded-xl text-xl">&#128269;</button>
    </div>
    <div class="grid grid-cols-4 gap-2 mt-4 text-center text-2xl">
      <button class="cat p-2 bg-gray-50 rounded-xl" data-cat="grains">&#127806;</button>
      <button class="cat p-2 bg-gray-50 rounded-xl" data-cat="hardware">&#128296;</button>
      <button class="cat p-2 bg-gray-50 rounded-xl" data-cat="transport">&#128667;</button>
      <button class="cat p-2 bg-gray-50 rounded-xl" data-cat="food">&#127859;</button>
    </div>
  </div>

  <div id="map" class="h-64 rounded-2xl shadow-md mb-4 z-0"></div>
  <div id="results" class="space-y-3"></div>
</main>

<script>
const sb = supabase.createClient(SKM_CONFIG.SUPABASE_URL, SKM_CONFIG.SUPABASE_ANON_KEY);
const map = L.map('map').setView([20.5937, 78.9629], 5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);
let markers = [];

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim().toUpperCase();
  if (!q) return;
  const isPincode = /^\d{6}$/.test(q);
  const { data, error } = isPincode
    ? await sb.from('business_listings').select('*').eq('pincode', q).limit(50)
    : await sb.from('business_listings').select('*').eq('digipin', q).limit(50);
  if (error) { console.error(error); return; }
  renderResults(data || []);
}

function renderResults(rows) {
  markers.forEach(m => map.removeLayer(m)); markers = [];
  const el = document.getElementById('results');
  el.innerHTML = rows.length ? '' : '<p class="text-center text-gray-400 text-3xl">&#128533;</p>';
  rows.forEach(r => {
    track(r.id, 'seo_view');
    const card = document.createElement('div');
    card.className = 'bg-white p-4 rounded-2xl shadow-md';
    card.innerHTML = `
      <div class="flex justify-between items-start">
        <div>
          <h2 class="font-bold text-lg">${esc(r.name)}</h2>
          <p class="text-xs text-gray-500 font-mono">${esc(r.digipin || r.pincode)}</p>
        </div>
        <span class="text-2xl">${r.is_verified ? '&#9989;' : ''}</span>
      </div>
      <div class="grid grid-cols-2 gap-2 mt-3">
        <a href="https://wa.me/${esc(r.whatsapp_number || '')}" onclick="track('${r.id}','whatsapp_click')" class="bg-emerald-500 text-white p-3 rounded-xl text-center text-2xl">&#128172;</a>
        <a href="/l/${r.id}" class="bg-indigo-500 text-white p-3 rounded-xl text-center text-2xl">&#128205;</a>
      </div>`;
    el.appendChild(card);
    if (r.location?.coordinates) {
      const [lng, lat] = r.location.coordinates;
      markers.push(L.marker([lat, lng]).addTo(map).bindPopup(r.name));
    }
  });
  if (markers.length) map.fitBounds(L.featureGroup(markers).getBounds().pad(0.2));
}

function track(shopId, action) {
  sb.from('lead_tracking').insert({ shop_id: shopId, action_type: action }).then(() => {});
}
function esc(s) { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }
document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
</script>
</body>
</html>
